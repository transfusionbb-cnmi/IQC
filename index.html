<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IQC Blood Bank</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --primary: #4fa3e3;
      --primary-dark: #2f80c9;
      --bg: #f3f9ff;
      --card: #ffffff;
      --sidebar: #315f86;
      --sidebar-soft: #3f749f;
      --text: #1f3347;
      --muted: #6b7f95;
      --border: #d5e7f6;
      --danger: #c96a6a;
      --success: #5fa887;
      --warning: #d3a65f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Kanit", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input {
      font-family: inherit;
    }

    .hidden {
      display: none !important;
    }

    body.mobile-menu-open {
      overflow: hidden;
    }

    /* LOGIN */
    .login-page {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, #eaf3ff 0, transparent 34%),
        radial-gradient(circle at bottom right, #dfeeff 0, transparent 36%),
        #f7fbff;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
    }

    .login-logo {
      width: 82px;
      height: 82px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      box-shadow: 0 16px 30px rgba(108, 145, 194, 0.22);
    }

    .login-title {
      margin: 0;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
    }

    .login-subtitle {
      margin: 8px 0 28px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #374151;
    }

    .form-control {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 13px 14px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      transition: 0.15s ease;
    }

    .btn-primary {
      width: 100%;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 10px 22px rgba(108, 145, 194, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      display: none;
    }

    .alert-danger {
      color: #991b1b;
      background: #fee2e2;
      border: 1px solid #fecaca;
    }

    .alert-success {
      color: #166534;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
    }

    /* APP LAYOUT */
    .app {
      min-height: 100vh;
      display: flex;
      background: var(--bg);
    }

    .sidebar {
      width: 292px;
      height: 100dvh;
      min-height: 100dvh;
      background: var(--sidebar);
      color: #e5e7eb;
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, transform 0.2s ease;
      z-index: 30;
      overflow: hidden;
      overscroll-behavior: contain;
    }

    .sidebar.collapsed {
      width: 82px;
    }

    .sidebar-header {
      height: 74px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand-icon {
      min-width: 42px;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
    }

    .brand-text {
      overflow: hidden;
      white-space: nowrap;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
    }

    .brand-subtitle {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 3px;
    }

    .sidebar.collapsed .brand-text,
    .sidebar.collapsed .menu-text,
    .sidebar.collapsed .submenu,
    .sidebar.collapsed .menu-arrow,
    .sidebar.collapsed .user-info {
      display: none;
    }

    .sidebar-body {
      flex: 1;
      min-height: 0;
      padding: 12px;
      padding-bottom: 24px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .menu-item,
    .menu-toggle,
    .submenu-item {
      width: 100%;
      color: #d1d5db;
      background: transparent;
      border: 0;
      text-align: left;
      padding: 11px 12px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
    }

    .menu-item:hover,
    .menu-toggle:hover,
    .submenu-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .menu-item.active,
    .submenu-item.active {
      background: rgba(126, 166, 217, 0.28);
      color: #fff;
    }

    .menu-icon {
      min-width: 22px;
      font-size: 18px;
      text-align: center;
    }

    .menu-arrow {
      margin-left: auto;
      transition: 0.16s ease;
      font-size: 12px;
    }

    .menu-toggle.open .menu-arrow {
      transform: rotate(90deg);
    }

    .submenu {
      margin: 4px 0 8px 34px;
      padding-left: 10px;
      border-left: 1px solid rgba(255, 255, 255, 0.12);
      display: none;
    }

    .submenu.open {
      display: block;
    }

    .submenu-item {
      font-size: 13px;
      padding: 9px 10px;
      color: #cbd5e1;
    }

    .sidebar-footer {
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--sidebar);
    }

    .user-box {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .avatar {
      min-width: 38px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #374151;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }

    .user-role {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .btn-logout {
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
    }

    .btn-logout:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .main {
      flex: 1;
      margin-left: 292px;
      transition: margin-left 0.2s ease;
      min-width: 0;
    }

    .main.collapsed {
      margin-left: 82px;
    }

    .topbar {
      height: 74px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-button {
      border: 1px solid var(--border);
      background: #fff;
      color: #374151;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .content {
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
      margin-bottom: 18px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-text {
      color: var(--muted);
      line-height: 1.7;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #eaf2fb;
      color: #5679a8;
    }

    .mobile-overlay {
      display: none;
    }

    @media (max-width: 900px) {
      .sidebar {
        transform: translateX(-100%);
        width: 292px;
      }

      .sidebar.mobile-open {
        transform: translateX(0);
      }

      .sidebar.collapsed {
        width: 292px;
      }

      .main,
      .main.collapsed {
        margin-left: 0;
      }

      .mobile-overlay.show {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.42);
        z-index: 25;
      }

      .content {
        padding: 18px;
      }

      .page-title {
        font-size: 19px;
      }

      .topbar {
        padding: 0 14px;
      }
    }
  </style>
</head>

<body>
  <!-- LOGIN PAGE -->
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <i class="bi bi-droplet-half"></i>
      </div>

      <h1 class="login-title">IQC Blood Bank</h1>
      <p class="login-subtitle">
        ระบบบันทึก Internal Quality Control<br>
        Blood Bank & Blood Donation Unit
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Username / รหัสพนักงาน</label>
          <input id="username" class="form-control" type="text" autocomplete="username" placeholder="เช่น 011234">
        </div>

        <div class="form-group">
          <label class="form-label" for="pin">PIN</label>
          <input id="pin" class="form-control" type="password" autocomplete="current-password" placeholder="ใส่รหัสผ่าน">
        </div>

        <button id="loginBtn" class="btn btn-primary" type="submit">
          <i class="bi bi-box-arrow-in-right"></i>
          เข้าสู่ระบบ
        </button>

        <div id="loginAlert" class="alert alert-danger"></div>
      </form>
    </div>
  </section>

  <!-- APP PAGE -->
  <section id="appPage" class="app hidden">
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="brand-icon">
          <i class="bi bi-droplet-half"></i>
        </div>
        <div class="brand-text">
          <div class="brand-title">IQC Blood Bank</div>
          <div class="brand-subtitle">CNMI Laboratory</div>
        </div>
      </div>

      <div class="sidebar-body">
        <button class="menu-item active" data-page="dashboard">
          <i class="bi bi-speedometer2 menu-icon"></i>
          <span class="menu-text">Dashboard</span>
        </button>

        <button class="menu-toggle">
          <i class="bi bi-pencil-square menu-icon"></i>
          <span class="menu-text">บันทึก IQC</span>
          <i class="bi bi-chevron-right menu-arrow"></i>
        </button>
        <div class="submenu">
          <button class="submenu-item" data-page="daily-qc">Daily QC</button>
          <button class="submenu-item" data-page="test-dependent-qc">Test-dependent QC</button>
          <button class="submenu-item" data-page="calibration">Calibration</button>
          <button class="submenu-item" data-page="weekly-component-qc">Weekly Component QC</button>
        </div>

        <button class="menu-toggle">
          <i class="bi bi-exclamation-triangle menu-icon"></i>
          <span class="menu-text">บันทึกแก้ไข IQC ไม่ผ่าน</span>
          <i class="bi bi-chevron-right menu-arrow"></i>
        </button>
        <div class="submenu">
          <button class="submenu-item" data-page="fail-daily-qc">Daily QC</button>
          <button class="submenu-item" data-page="fail-test-dependent-qc">Test-dependent QC</button>
          <button class="submenu-item" data-page="fail-calibration">Calibration</button>
          <button class="submenu-item" data-page="fail-weekly-component-qc">Weekly Component QC</button>
        </div>

        <button class="menu-toggle">
          <i class="bi bi-sliders menu-icon"></i>
          <span class="menu-text">ตั้งค่า Expected</span>
          <i class="bi bi-chevron-right menu-arrow"></i>
        </button>
        <div class="submenu">
          <button class="submenu-item" data-page="expected-matrix">Expected Matrix</button>
          <button class="submenu-item" data-page="component-list">Component List</button>
        </div>

        <button class="menu-toggle">
          <i class="bi bi-clock-history menu-icon"></i>
          <span class="menu-text">ดูย้อนหลัง</span>
          <i class="bi bi-chevron-right menu-arrow"></i>
        </button>
        <div class="submenu">
          <button class="submenu-item" data-page="history-record">ประวัติการบันทึก IQC</button>
          <button class="submenu-item" data-page="history-fail-action">ประวัติการแก้ไข IQC ไม่ผ่าน</button>
          <button class="submenu-item" data-page="audit-log">Audit Log</button>
        </div>

        <button class="menu-toggle">
          <i class="bi bi-check2-square menu-icon"></i>
          <span class="menu-text">Reviewer</span>
          <i class="bi bi-chevron-right menu-arrow"></i>
        </button>
        <div class="submenu">
          <button class="submenu-item" data-page="review-pending">รอตรวจสอบ</button>
          <button class="submenu-item" data-page="monthly-summary">Monthly Summary</button>
          <button class="submenu-item" data-page="final-approve">Final Approve</button>
        </div>

        <button class="menu-toggle">
          <i class="bi bi-gear menu-icon"></i>
          <span class="menu-text">ตั้งค่าระบบ</span>
          <i class="bi bi-chevron-right menu-arrow"></i>
        </button>
        <div class="submenu">
          <button class="submenu-item" data-page="users">Users</button>
          <button class="submenu-item" data-page="qc-catalog">QC Catalog</button>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="user-box">
          <div class="avatar">
            <i class="bi bi-person"></i>
          </div>
          <div class="user-info">
            <div id="sideUserName" class="user-name">-</div>
            <div id="sideUserRole" class="user-role">-</div>
          </div>
        </div>

        <button id="logoutBtn" class="btn btn-logout">
          <i class="bi bi-box-arrow-left"></i>
          <span class="menu-text">ออกจากระบบ</span>
        </button>
      </div>
    </aside>

    <main id="main" class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebarToggle" class="icon-button" type="button">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <div id="pageTitle" class="page-title">Dashboard</div>
            <div id="pageSubtitle" class="page-subtitle">ภาพรวมระบบบันทึก IQC</div>
          </div>
        </div>

        <span id="topRoleBadge" class="badge">-</span>
      </header>

      <section id="content" class="content">
        <div class="card">
          <div class="card-title">Dashboard</div>
          <div class="card-text">
            เข้าสู่ระบบสำเร็จแล้ว หน้านี้เป็นโครงเริ่มต้นสำหรับ IQC Blood Bank
          </div>
        </div>
      </section>
    </main>
  </section>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxHjKSW7CXVU18SJ_trWd9XTp5gKUfi2Lu3DUC7LqzFyV7QZgcdWdOV7imj9x0FPDVr/exec";

    let currentUser = null;
    let currentToken = localStorage.getItem("IQC_TOKEN") || "";

    const pageInfo = {
      "dashboard": ["Dashboard", "ภาพรวมระบบบันทึก IQC"],

      "daily-qc": ["Daily QC", "บันทึก IQC ประจำวัน"],
      "test-dependent-qc": ["Test-dependent QC", "บันทึก IQC ตามรายการทดสอบ"],
      "calibration": ["Calibration", "บันทึกการ Calibrate"],
      "weekly-component-qc": ["Weekly Component QC", "บันทึก QC ส่วนประกอบโลหิตรายสัปดาห์"],

      "fail-daily-qc": ["แก้ไข IQC ไม่ผ่าน: Daily QC", "บันทึกการดำเนินการเมื่อ IQC ไม่ผ่านรอบแรก"],
      "fail-test-dependent-qc": ["แก้ไข IQC ไม่ผ่าน: Test-dependent QC", "บันทึกการดำเนินการเมื่อ IQC ไม่ผ่านรอบแรก"],
      "fail-calibration": ["แก้ไข IQC ไม่ผ่าน: Calibration", "บันทึกการดำเนินการเมื่อ IQC ไม่ผ่านรอบแรก"],
      "fail-weekly-component-qc": ["แก้ไข IQC ไม่ผ่าน: Weekly Component QC", "บันทึกการดำเนินการเมื่อ IQC ไม่ผ่านรอบแรก"],

      "expected-matrix": ["Expected Matrix", "ตั้งค่าผล Expected ตาม Lot / Panel Cell"],
      "component-list": ["Component List", "ตั้งค่ารายการส่วนประกอบโลหิต"],

      "history-record": ["ประวัติการบันทึก IQC", "ค้นหาและดูย้อนหลังรายการบันทึก IQC"],
      "history-fail-action": ["ประวัติการแก้ไข IQC ไม่ผ่าน", "ดูประวัติ Action และผลหลังแก้ไข"],
      "audit-log": ["Audit Log", "ประวัติการใช้งานและการเปลี่ยนแปลงในระบบ"],

      "review-pending": ["รอตรวจสอบ", "รายการที่รอ Reviewer ตรวจสอบ"],
      "monthly-summary": ["Monthly Summary", "สรุป IQC รายเดือน"],
      "final-approve": ["Final Approve", "อนุมัติขั้นสุดท้าย"],

      "users": ["Users", "จัดการผู้ใช้งานและเปลี่ยนรหัส"],
      "qc-catalog": ["QC Catalog", "ตั้งค่ารายการ IQC ในระบบ"]
    };

    document.addEventListener("DOMContentLoaded", () => {
      setupEvents();

      if (currentToken) {
        checkSession();
      }
    });

    function setupEvents() {
      document.getElementById("loginForm").addEventListener("submit", handleLogin);
      document.getElementById("logoutBtn").addEventListener("click", handleLogout);
      document.getElementById("sidebarToggle").addEventListener("click", toggleSidebar);
      document.getElementById("mobileOverlay").addEventListener("click", closeMobileSidebar);

      document.querySelectorAll(".menu-toggle").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.classList.toggle("open");
          const submenu = btn.nextElementSibling;
          if (submenu) submenu.classList.toggle("open");
        });
      });

      document.querySelectorAll("[data-page]").forEach(btn => {
        btn.addEventListener("click", () => {
          setActiveMenu(btn);
          showPage(btn.dataset.page);
          closeMobileSidebar();
        });
      });
    }

    async function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const pin = document.getElementById("pin").value.trim();
      const loginBtn = document.getElementById("loginBtn");

      hideLoginAlert();

      if (!username || !pin) {
        showLoginAlert("กรุณากรอก Username และ PIN");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> กำลังเข้าสู่ระบบ...';

      try {
        const url = WEB_APP_URL
          + "?action=login"
          + "&username=" + encodeURIComponent(username)
          + "&pin=" + encodeURIComponent(pin);

        const res = await fetch(url);
        const data = await res.json();

        if (!data.ok) {
          showLoginAlert(data.message || "เข้าสู่ระบบไม่สำเร็จ");
          return;
        }

        currentUser = data.user;
        currentToken = data.token;
        localStorage.setItem("IQC_TOKEN", currentToken);

        showApp();

      } catch (err) {
        showLoginAlert("เชื่อมต่อระบบไม่ได้: " + err.message);
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> เข้าสู่ระบบ';
      }
    }

    async function checkSession() {
      try {
        const url = WEB_APP_URL
          + "?action=me"
          + "&token=" + encodeURIComponent(currentToken);

        const res = await fetch(url);
        const data = await res.json();

        if (data.ok) {
          currentUser = data.user;
          showApp();
        } else {
          localStorage.removeItem("IQC_TOKEN");
          currentToken = "";
        }
      } catch (err) {
        localStorage.removeItem("IQC_TOKEN");
        currentToken = "";
      }
    }

    async function handleLogout() {
      try {
        if (currentToken) {
          const url = WEB_APP_URL
            + "?action=logout"
            + "&token=" + encodeURIComponent(currentToken);

          await fetch(url);
        }
      } catch (err) {
        console.log(err);
      }

      currentUser = null;
      currentToken = "";
      localStorage.removeItem("IQC_TOKEN");

      document.getElementById("appPage").classList.add("hidden");
      document.getElementById("loginPage").classList.remove("hidden");
    }

    function showApp() {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("appPage").classList.remove("hidden");

      document.getElementById("sideUserName").textContent = currentUser.fullName || currentUser.username || "-";
      document.getElementById("sideUserRole").textContent = currentUser.role || "-";
      document.getElementById("topRoleBadge").textContent = currentUser.role || "-";

      applyRoleMenu();
      showPage("dashboard");
    }

    function applyRoleMenu() {
      const role = currentUser?.role || "";

      const roleAllow = {
        staff: [
          "dashboard",
          "daily-qc", "test-dependent-qc", "calibration", "weekly-component-qc",
          "fail-daily-qc", "fail-test-dependent-qc", "fail-calibration", "fail-weekly-component-qc",
          "history-record", "history-fail-action"
        ],

        manager: [
          "dashboard",
          "daily-qc", "test-dependent-qc", "calibration", "weekly-component-qc",
          "fail-daily-qc", "fail-test-dependent-qc", "fail-calibration", "fail-weekly-component-qc",
          "expected-matrix", "component-list",
          "history-record", "history-fail-action", "audit-log",
          "review-pending", "monthly-summary"
        ],

        sup_manager: [
          "dashboard",
          "daily-qc", "test-dependent-qc", "calibration", "weekly-component-qc",
          "fail-daily-qc", "fail-test-dependent-qc", "fail-calibration", "fail-weekly-component-qc",
          "expected-matrix", "component-list",
          "history-record", "history-fail-action", "audit-log",
          "review-pending", "monthly-summary",
          "users", "qc-catalog"
        ],

        physician: [
          "dashboard",
          "history-record", "history-fail-action",
          "review-pending", "monthly-summary", "final-approve"
        ],

        admin: Object.keys(pageInfo)
      };

      const allowed = roleAllow[role] || ["dashboard"];

      document.querySelectorAll("[data-page]").forEach(btn => {
        const page = btn.dataset.page;
        btn.style.display = allowed.includes(page) ? "flex" : "none";
      });

      document.querySelectorAll(".menu-toggle").forEach(toggle => {
        const submenu = toggle.nextElementSibling;
        if (!submenu) return;

        const visibleItems = [...submenu.querySelectorAll("[data-page]")]
          .filter(item => item.style.display !== "none");

        toggle.style.display = visibleItems.length > 0 ? "flex" : "none";
        submenu.style.display = visibleItems.length > 0 ? "" : "none";
      });
    }

    function showPage(page) {
      const info = pageInfo[page] || ["ไม่พบหน้า", ""];

      document.getElementById("pageTitle").textContent = info[0];
      document.getElementById("pageSubtitle").textContent = info[1];

      document.getElementById("content").innerHTML = `
        <div class="card">
          <div class="card-title">${info[0]}</div>
          <div class="card-text">
            ${info[1] || "หน้านี้ยังอยู่ระหว่างเตรียมโครงสร้าง"}
          </div>
        </div>

        <div class="card">
          <div class="card-title">สถานะ</div>
          <div class="card-text">
            ผู้ใช้งาน: <strong>${currentUser?.fullName || "-"}</strong><br>
            Role: <strong>${currentUser?.role || "-"}</strong><br>
            หน้าที่เปิดอยู่: <strong>${page}</strong>
          </div>
        </div>
      `;
    }

    function setActiveMenu(activeBtn) {
      document.querySelectorAll("[data-page]").forEach(btn => {
        btn.classList.remove("active");
      });
      activeBtn.classList.add("active");
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      const main = document.getElementById("main");

      if (window.innerWidth <= 900) {
        sidebar.classList.add("mobile-open");
        document.getElementById("mobileOverlay").classList.add("show");
        document.body.classList.add("mobile-menu-open");
        return;
      }

  sidebar.classList.toggle("collapsed");
  main.classList.toggle("collapsed");
}

    function closeMobileSidebar() {
      document.getElementById("sidebar").classList.remove("mobile-open");
      document.getElementById("mobileOverlay").classList.remove("show");
      document.body.classList.remove("mobile-menu-open");
    }

    function showLoginAlert(message) {
      const alert = document.getElementById("loginAlert");
      alert.textContent = message;
      alert.style.display = "block";
    }

    function hideLoginAlert() {
      const alert = document.getElementById("loginAlert");
      alert.textContent = "";
      alert.style.display = "none";
    }
  </script>
</body>
</html>
